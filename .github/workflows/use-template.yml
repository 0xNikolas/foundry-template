name: "Create"

# The workflow will run when the "Use this template" button is used
on:
  push:

jobs:
  create:
    # Run only on the initial push that creates the default branch of a repo generated from this
    # template — never in the template repository itself, never on later pushes or other branches.
    # This is an explicit run-once guard; we don't rely solely on the workflow deleting itself
    # below, since a partial failure would otherwise let a later push re-run the rename and
    # force-amend real history. References:
    # - https://docs.github.com/en/actions/learn-github-actions/contexts
    # - https://docs.github.com/en/actions/learn-github-actions/expressions
    if: >-
      ${{
        !github.event.repository.is_template &&
        github.event.created &&
        github.ref_name == github.event.repository.default_branch
      }}
    permissions: "write-all"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Check out the repo"
        uses: "actions/checkout@v7"

      - name: "Update package.json"
        env:
          GITHUB_REPOSITORY_DESCRIPTION: ${{ github.event.repository.description }}
        run: ./.github/scripts/rename.sh "$GITHUB_REPOSITORY" "$GITHUB_REPOSITORY_OWNER" "$GITHUB_REPOSITORY_DESCRIPTION"

      - name: "Add rename summary"
        run: |
          echo "## Commit result" >> $GITHUB_STEP_SUMMARY
          echo "✅ Passed" >> $GITHUB_STEP_SUMMARY

      - name: "Remove files not needed in the user's copy of the template"
        run: |
          rm -f "./.github/scripts/rename.sh"
          rm -f "./.github/workflows/use-template.yml"

      - name: "Add remove summary"
        run: |
          echo "## Remove result" >> $GITHUB_STEP_SUMMARY
          echo "✅ Passed" >> $GITHUB_STEP_SUMMARY

      - name: "Update commit"
        uses: "stefanzweifel/git-auto-commit-action@v4"
        with:
          commit_message: "feat: initial commit"
          commit_options: "--amend"
          push_options: "--force"
          skip_fetch: true

      - name: "Add commit summary"
        run: |
          echo "## Commit result" >> $GITHUB_STEP_SUMMARY
          echo "✅ Passed" >> $GITHUB_STEP_SUMMARY
